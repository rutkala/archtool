# =====================================================================
#  Example building (TEST FIXTURE) for archtool
#  This file exists only to exercise the tool. The product is the
#  compiler, not this house. Geometry reverse-engineered from the
#  embedded `projectData` JSON in dom_viewer.html (a standalone JS plan
#  viewer this house's design was originally exported to) — point names
#  and wall/room ids are kept close to the original Polish abbreviations
#  ("s_" = sciana nosna/load-bearing wall, "d_" = sciana dzialowa/
#  partition wall, "n"/"w"/"d"-prefixed points = corner/junction/local
#  axis points) so the fixture stays traceable back to its source.
#  Walls and rooms are exactly the source export's data — large parts of
#  the outline have no rooms defined yet, which is fine: SPEC.md does not
#  require full room coverage. The source export only had one opening
#  (D1); D_utility, W_utility, and Gate_garage were added on top of it to
#  exercise all four opening types ("door", "window", "garage_gate",
#  "empty_space") against this fixture.
#  Interpretation governed by SPEC.md (format_version 1.0).
# =====================================================================

building:
  name: "Dom Gruszowa 60"
  address: "ul. Gruszowa 60, Czestochowa"
  ceiling_height: 285
  exterior_wall_thickness: 30
  partition_wall_thickness: 15
  unit: "cm"
  format_version: "1.0"
  spec: "SPEC.md"

# Outline defines the building perimeter inline.  Each point declares its
# coordinates once and optionally names the architectural grid line it sits
# on (x_axis = vertical gridline label, y_axis = horizontal gridline label).
# The SVG backend draws dashed reference lines + bubble labels for every
# distinct axis.  Interior junction points (wall T-intersections, opening
# endpoints) that don't lie on the perimeter go in `points:` below.
outline:
  - id: n1C
    x: 0
    y: 200
    x_axis: "1"
    y_axis: "C"
  - id: n2C
    x: 240
    y: 200
    x_axis: "2"
  - id: n2A
    x: 240
    y: 0
    y_axis: "A"
  - id: n3A
    x: 645
    y: 0
    x_axis: "3"
  - id: n3C
    x: 645
    y: 200
  - id: n5C
    x: 1240
    y: 200
    x_axis: "5"
  - id: n5B
    x: 1240
    y: 100
    y_axis: "B"
  - id: n8B
    x: 2718
    y: 100
    x_axis: "8"
  - id: n8D
    x: 2718
    y: 494
    y_axis: "D"
  - id: n8aD
    x: 2748
    y: 494
    x_axis: "8a"
  - id: n8aG
    x: 2748
    y: 949
    y_axis: "G"
  - id: n7G
    x: 2470
    y: 949
    x_axis: "7"
  - id: n7H
    x: 2470
    y: 1110
    y_axis: "H"
  - id: n6H
    x: 1850
    y: 1110
    x_axis: "6"
  - id: n6F
    x: 1850
    y: 870
    y_axis: "F"
  - id: n4F
    x: 975
    y: 870
    x_axis: "4"
  - id: n4H
    x: 975
    y: 1110
  - id: n3H
    x: 645
    y: 1110
  - id: n3G
    x: 645
    y: 949
  - id: n1G
    x: 0
    y: 949

# Interior junction and opening-endpoint points (not on the perimeter).
points:
  w3E: [645, 574]
  w4E: [975, 574]
  w5E: [1240, 574]
  w5E1: [1455, 574]
  w6E: [1850, 574]
  w6E1: [1980, 574]
  w6D1: [1980, 494]
  d2C1: [240, 268]
  d3C1: [645, 268]
  d3E3: [645, 715]
  d4E3: [975, 715]
  d5E2: [1240, 690]
  d51E2: [1455, 690]
  oE1: [1255, 574]
  oE2: [1440, 574]
  # Utility room's own back door (north exterior wall, n2A-n3A).
  oUD1: [280, 0]
  oUD2: [370, 0]
  # Utility room window (west exterior wall, n2C-n2A).
  oUW1: [240, 60]
  oUW2: [240, 150]
  # Garage vehicle door (south exterior wall, n3G-n1G).
  oG1: [100, 949]
  oG2: [380, 949]

walls:
  - id: "s_3"
    from: n3C
    to: n3G
    type: "load_bearing"
    # thickness omitted → defaults to exterior_wall_thickness (30 cm)
  - id: "s_4"
    from: w4E
    to: n4F
    type: "load_bearing"
  - id: "s_6"
    from: w6E
    to: n6F
    type: "load_bearing"
  - id: "s_6b"
    from: w6D1
    to: w6E1
    type: "load_bearing"
  - id: "s_8D"
    from: w6D1
    to: n8D
    type: "load_bearing"
  - id: "s_E"
    from: w3E
    to: w6E
    type: "load_bearing"
  - id: "d_pgv"
    from: n2C
    to: d2C1
    type: "partition"
    # thickness omitted → defaults to partition_wall_thickness (15 cm)
    # The exterior wall above (30cm, axis x=240) and d_pgv (15cm) share
    # the same axis. Centered, their faces would be 7.5cm out of line on
    # both sides; "left" keeps d_pgv's full thickness on the utility-room
    # side (toward larger x), flush with the exterior wall's face there,
    # while still sharing the exact same connection point n2C.
    justify: "left"
  - id: "d_pgh"
    from: d2C1
    to: d3C1
    type: "partition"
  - id: "d_sph"
    from: d3E3
    to: d4E3
    type: "partition"
  - id: "d_wtv"
    from: w5E
    to: d5E2
    type: "partition"
    justify: "right"

openings:
  - id: "D1"
    # 185cm is far wider than a real door leaf; modeled as an open
    # structural pass-through rather than forcing an oversized door swing.
    type: "empty_space"
    from: w5E
    to: oE2
    sill: 0
    height: 200
  - id: "D_utility"
    type: "door"
    from: oUD1
    to: oUD2
    sill: 0
    height: 200
  - id: "W_utility"
    type: "window"
    from: oUW1
    to: oUW2
    sill: 90
    height: 110
  - id: "Gate_garage"
    type: "garage_gate"
    from: oG1
    to: oG2
    sill: 0
    height: 220

rooms:
  - id: "garaz"
    name: "Garage"
    floor: "concrete"
    outline: [n1C, n2C, d2C1, d3C1, n3G, n1G]
  - id: "pom_gosp"
    name: "Utility room"
    floor: "tiles"
    outline: [n2A, n3A, d3C1, d2C1]
