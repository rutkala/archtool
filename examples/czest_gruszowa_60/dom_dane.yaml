# =====================================================================
#  Example building (TEST FIXTURE) for archtool
#  This file exists only to exercise the tool. The product is the
#  compiler, not this house. Geometry reverse-engineered from the
#  embedded `projectData` JSON in dom_viewer.html (a standalone JS plan
#  viewer this house's design was originally exported to) — point names
#  and wall/room ids are kept close to the original Polish abbreviations
#  ("s_" = sciana nosna/load-bearing wall, "d_" = sciana dzialowa/
#  partition wall, "n"/"w"/"d"-prefixed points = corner/junction/local
#  axis points) so the fixture stays traceable back to its source.
#  Walls and rooms are exactly the source export's data — large parts of
#  the outline have no rooms defined yet, which is fine: SPEC.md does not
#  require full room coverage. The source export only had one opening
#  (D1); D_utility, W_utility, and Gate_garage were added on top of it to
#  exercise all four opening types ("door", "window", "garage_gate",
#  "empty_space") against this fixture.
#  Interpretation governed by SPEC.md (format_version 1.0).
# =====================================================================

building:
  name: "Dom Gruszowa 60"
  address: "ul. Gruszowa 60, Czestochowa"
  ceiling_height: 285
  exterior_wall_thickness: 30
  partition_wall_thickness: 15
  unit: "cm"
  format_version: "1.0"
  spec: "SPEC.md"

# Outline defines the building perimeter as a bare list of [x, y]
# coordinate pairs, in perimeter order.  The tool auto-labels the distinct
# x-values as vertical gridlines "1","2","3",... and the distinct y-values
# as horizontal gridlines "A","B","C",... (sorted ascending), then derives
# each point's id from those labels: o<x_label><y_label>.  The SVG backend
# draws dashed reference lines + bubble labels for every axis.  A point can
# still be given explicit `id` / `x_axis` / `y_axis` (object form) to
# override the automatic ones; this fixture uses the fully automatic form.
# Interior junction points (wall T-intersections, opening endpoints) that
# don't lie on the perimeter go in `points:` below.
outline:
  - [0, 200]      # o1C
  - [240, 200]    # o2C
  - [240, 0]      # o2A
  - [645, 0]      # o3A
  - [645, 200]    # o3C
  - [1240, 200]   # o5C
  - [1240, 100]   # o5B
  - [2718, 100]   # o8B
  - [2718, 494]   # o8D
  - [2748, 494]   # o9D
  - [2748, 949]   # o9F
  - [2470, 949]   # o7F
  - [2470, 1110]  # o7G
  - [1850, 1110]  # o6G
  - [1850, 870]   # o6E
  - [975, 870]    # o4E
  - [975, 1110]   # o4G
  - [645, 1110]   # o3G
  - [645, 949]    # o3F
  - [0, 949]      # o1F

# Interior junction and opening-endpoint points (not on the perimeter).
points:
  w3E: [645, 574]
  w4E: [975, 574]
  w5E: [1240, 574]
  w5E1: [1455, 574]
  w6E: [1850, 574]
  w6E1: [1980, 574]
  w6D1: [1980, 494]
  d2C1: [240, 268]
  d3C1: [645, 268]
  d3E3: [645, 715]
  d4E3: [975, 715]
  d5E2: [1240, 690]
  d51E2: [1455, 690]
  oE1: [1255, 574]
  oE2: [1440, 574]
  # Utility room's own back door (north exterior wall, o2A-o3A).
  oUD1: [280, 0]
  oUD2: [370, 0]
  # Utility room window (west exterior wall, o2C-o2A).
  oUW1: [240, 60]
  oUW2: [240, 150]
  # Garage vehicle door (south exterior wall, o3F-o1F).
  oG1: [100, 949]
  oG2: [380, 949]

walls:
  - id: "s_3"
    from: o3C
    to: o3F
    type: "load_bearing"
    # thickness omitted → defaults to exterior_wall_thickness (30 cm)
  - id: "s_4"
    from: w4E
    to: o4E
    type: "load_bearing"
  - id: "s_6"
    from: w6E
    to: o6E
    type: "load_bearing"
  - id: "s_6b"
    from: w6D1
    to: w6E1
    type: "load_bearing"
  - id: "s_8D"
    from: w6D1
    to: o8D
    type: "load_bearing"
  - id: "s_E"
    from: w3E
    to: w6E
    type: "load_bearing"
  - id: "d_pgv"
    from: o2C
    to: d2C1
    type: "partition"
    # thickness omitted → defaults to partition_wall_thickness (15 cm)
    # The exterior wall above (30cm, axis x=240) and d_pgv (15cm) share
    # the same axis. Centered, their faces would be 7.5cm out of line on
    # both sides; "left" keeps d_pgv's full thickness on the utility-room
    # side (toward larger x), flush with the exterior wall's face there,
    # while still sharing the exact same connection point o2C.
    justify: "left"
  - id: "d_pgh"
    from: d2C1
    to: d3C1
    type: "partition"
  - id: "d_sph"
    from: d3E3
    to: d4E3
    type: "partition"
  - id: "d_wtv"
    from: w5E
    to: d5E2
    type: "partition"
    justify: "right"

openings:
  - id: "D1"
    # 185cm is far wider than a real door leaf; modeled as an open
    # structural pass-through rather than forcing an oversized door swing.
    type: "empty_space"
    from: w5E
    to: oE2
    sill: 0
    height: 200
  - id: "D_utility"
    type: "door"
    from: oUD1
    to: oUD2
    sill: 0
    height: 200
  - id: "W_utility"
    type: "window"
    from: oUW1
    to: oUW2
    sill: 90
    height: 110
  - id: "Gate_garage"
    type: "garage_gate"
    from: oG1
    to: oG2
    sill: 0
    height: 220

rooms:
  - id: "garaz"
    name: "Garage"
    floor: "concrete"
    outline: [o1C, o2C, d2C1, d3C1, o3F, o1F]
  - id: "pom_gosp"
    name: "Utility room"
    floor: "tiles"
    outline: [o2A, o3A, d3C1, d2C1]
