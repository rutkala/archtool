    <script>
        // --- DANE WSTRZYKNIĘTE PRZEZ KOMPILATOR ---
        const projectData = {"budynek": {"nazwa": "Dom Gruszowa 60", "adres": "ul. Gruszowa 60, Częstochowa", "wysokosc_sufitu": 285, "grubosc_sciany_zewnetrznej": 30, "grubosc_sciany_dzialowej": 15, "punkty_zewn_rz": [{"id": "1", "wartosc": 0}, {"id": "2", "wartosc": 240}, {"id": "3", "wartosc": 645}, {"id": "4", "wartosc": 975}, {"id": "5", "wartosc": 1240}, {"id": "6", "wartosc": 1850}, {"id": "7", "wartosc": 2470}, {"id": "8", "wartosc": 2718}, {"id": "8a", "wartosc": 2748}], "punkty_zewn_od": [{"id": "A", "wartosc": 0}, {"id": "B", "wartosc": 100}, {"id": "C", "wartosc": 200}, {"id": "D", "wartosc": 494}, {"id": "E", "wartosc": 574}, {"id": "F", "wartosc": 870}, {"id": "G", "wartosc": 949}, {"id": "H", "wartosc": 1110}], "punkty_wewn_n_rz": [{"id": "51", "wartosc": "5+215"}, {"id": "52", "wartosc": "51+150"}, {"id": "61", "wartosc": "6+130"}, {"id": "62", "wartosc": "6+288"}, {"id": "63", "wartosc": "62+288"}], "punkty_wewn_n_od": [{"id": "C1", "wartosc": "C+68"}, {"id": "E2", "wartosc": "E+116"}, {"id": "E3", "wartosc": "E+141"}], "punkty": {"n1C": ["1", "C"], "n2C": ["2", "C"], "n2A": ["2", "A"], "n3A": ["3", "A"], "n3C": ["3", "C"], "n5C": ["5", "C"], "n5B": ["5", "B"], "n8B": ["8", "B"], "n8D": ["8", "D"], "n8aD": ["8a", "D"], "n8aG": ["8a", "G"], "n7G": ["7", "G"], "n7H": ["7", "H"], "n6H": ["6", "H"], "n6F": ["6", "F"], "n4F": ["4", "F"], "n4H": ["4", "H"], "n3H": ["3", "H"], "n3G": ["3", "G"], "n1G": ["1", "G"], "w3E": ["3", "E"], "w4E": ["4", "E"], "w5E": ["5", "E"], "w5E1": ["51", "E"], "w6E": ["6", "E"], "w6E1": ["61", "E"], "w6D1": ["61", "D"], "d2C1": ["2", "C1"], "d3C1": ["3", "C1"], "d3E3": ["3", "E3"], "d4E3": ["4", "E3"], "d5E2": ["5", "E2"], "d51E2": ["51", "E2"]}, "obrys_zewnetrzny": [[0, 200], [240, 200], [240, 0], [645, 0], [645, 200], [1240, 200], [1240, 100], [2718, 100], [2718, 494], [2748, 494], [2748, 949], [2470, 949], [2470, 1110], [1850, 1110], [1850, 870], [975, 870], [975, 1110], [645, 1110], [645, 949], [0, 949]], "sciany": [{"id": "s_3", "od": [645.0, 215.0], "do": [645.0, 934.0], "od0": [645, 200], "do0": [645, 949], "lico": null, "typ": "nosna", "grubosc": 30, "etykieta": null, "otwory": []}, {"id": "s_4", "od": [975.0, 574.0], "do": [975.0, 855.0], "od0": [975, 574], "do0": [975, 870], "lico": null, "typ": "nosna", "grubosc": 30, "etykieta": null, "otwory": []}, {"id": "s_6", "od": [1850.0, 574.0], "do": [1850.0, 855.0], "od0": [1850, 574], "do0": [1850, 870], "lico": null, "typ": "nosna", "grubosc": 30, "etykieta": null, "otwory": []}, {"id": "s_6b", "od": [1980.0, 494.0], "do": [1980.0, 589.0], "od0": [1980.0, 494], "do0": [1980.0, 574], "lico": null, "typ": "nosna", "grubosc": 30, "etykieta": null, "otwory": []}, {"id": "s_8D", "od": [1980.0, 494.0], "do": [2703.0, 494.0], "od0": [1980.0, 494], "do0": [2718, 494], "lico": null, "typ": "nosna", "grubosc": 30, "etykieta": null, "otwory": []}, {"id": "s_E", "od": [645.0, 574.0], "do": [1850.0, 574.0], "od0": [645, 574], "do0": [1850, 574], "lico": null, "typ": "nosna", "grubosc": 30, "etykieta": null, "otwory": [{"typ": "drzwi", "od": [1255.0, 574.0], "do": [1440.0, 574.0]}]}, {"id": "d_pgv", "od": [247.5, 215.0], "do": [247.5, 268.0], "od0": [240, 200], "do0": [240, 268.0], "lico": null, "typ": "dzialowa", "grubosc": 15, "etykieta": null, "otwory": []}, {"id": "d_pgh", "od": [247.5, 268.0], "do": [645.0, 268.0], "od0": [240, 268.0], "do0": [645, 268.0], "lico": null, "typ": "dzialowa", "grubosc": 15, "etykieta": null, "otwory": []}, {"id": "d_sph", "od": [645.0, 715.0], "do": [975.0, 715.0], "od0": [645, 715.0], "do0": [975, 715.0], "lico": null, "typ": "dzialowa", "grubosc": 15, "etykieta": null, "otwory": []}, {"id": "d_wtv", "od": [1247.5, 574.0], "do": [1240.0, 690.0], "od0": [1240, 574], "do0": [1240, 690.0], "lico": null, "typ": "dzialowa", "grubosc": 15, "etykieta": null, "otwory": []}], "sciany_zewn": {"z_1C_2C": ["n1C", "n2C"], "z_2C_2A": ["n2C", "n2A"], "z_2A_3A": ["n2A", "n3A"], "z_3A_3C": ["n3A", "n3C"], "z_3C_5C": ["n3C", "n5C"], "z_5C_5B": ["n5C", "n5B"], "z_5B_8B": ["n5B", "n8B"], "z_8B_8D": ["n8B", "n8D"], "z_8D_8aD": ["n8D", "n8aD"], "z_8aD_8aG": ["n8aD", "n8aG"], "z_8aG_7G": ["n8aG", "n7G"], "z_7G_7H": ["n7G", "n7H"], "z_7H_6H": ["n7H", "n6H"], "z_6H_6F": ["n6H", "n6F"], "z_6F_4F": ["n6F", "n4F"], "z_4F_4H": ["n4F", "n4H"], "z_4H_3H": ["n4H", "n3H"], "z_3H_3G": ["n3H", "n3G"], "z_3G_1G": ["n3G", "n1G"], "z_1G_1C": ["n1G", "n1C"]}, "wymiary": [], "_wezly": [{"p": [975.0, 574.0], "g": 30}, {"p": [1850.0, 574.0], "g": 30}, {"p": [1980.0, 494.0], "g": 30}, {"p": [645.0, 574.0], "g": 30}, {"p": [247.5, 268.0], "g": 15}, {"p": [645.0, 268.0], "g": 30}, {"p": [645.0, 715.0], "g": 30}, {"p": [975.0, 715.0], "g": 30}, {"p": [1247.5, 574.0], "g": 30}], "_punkty": {"n1C": [0, 200], "n2C": [240, 200], "n2A": [240, 0], "n3A": [645, 0], "n3C": [645, 200], "n5C": [1240, 200], "n5B": [1240, 100], "n8B": [2718, 100], "n8D": [2718, 494], "n8aD": [2748, 494], "n8aG": [2748, 949], "n7G": [2470, 949], "n7H": [2470, 1110], "n6H": [1850, 1110], "n6F": [1850, 870], "n4F": [975, 870], "n4H": [975, 1110], "n3H": [645, 1110], "n3G": [645, 949], "n1G": [0, 949], "w3E": [645, 574], "w4E": [975, 574], "w5E": [1240, 574], "w5E1": [1455.0, 574], "w6E": [1850, 574], "w6E1": [1980.0, 574], "w6D1": [1980.0, 494], "d2C1": [240, 268.0], "d3C1": [645, 268.0], "d3E3": [645, 715.0], "d4E3": [975, 715.0], "d5E2": [1240, 690.0], "d51E2": [1455.0, 690.0]}, "_osie": {"xg": {"1": 0, "2": 240, "3": 645, "4": 975, "5": 1240, "6": 1850, "7": 2470, "8": 2718, "8a": 2748}, "yg": {"A": 0, "B": 100, "C": 200, "D": 494, "E": 574, "F": 870, "G": 949, "H": 1110}, "xw": {"51": 1455.0, "52": 1605.0, "61": 1980.0, "62": 2138.0, "63": 2426.0}, "yw": {"C1": 268.0, "E2": 690.0, "E3": 715.0}}}, "pomieszczenia": {"garaz": {"nazwa": "Garaż", "sciany": ["z_1C_2C", "d_pgv", "d_pgh", "s_3", "z_3G_1G", "z_1G_1C"], "wymiary": [{"od": [15.0, 574.5], "do": [630.0, 574.5], "dlugosc": 615, "opis": null, "odsun": 0}, {"od": [446.25, 275.5], "do": [446.25, 934.0], "dlugosc": 658, "opis": null, "odsun": 0}, {"od": [15.0, 241.5], "do": [240.0, 241.5], "dlugosc": 225, "opis": null, "odsun": 0}], "_poly": [[0.0, 200.0], [247.5, 200.0], [247.5, 268.0], [645.0, 268.0], [645.0, 949.0], [0.0, 949.0]], "_centroid": [315.1657622101628, 594.6802664035521], "_bbox": [0.0, 200.0, 645.0, 949.0], "_pole_osiowe": 45.61, "_pole": 41.86, "_wymiary": [615, 719], "_prostokat": false}, "pom_gosp": {"nazwa": "Pom. gospodarcze", "sciany": ["z_2A_3A", "z_3A_3C", "d_pgh", "z_2C_2A"], "wymiary": [{"od": [255.0, 241.5], "do": [630.0, 241.5], "dlugosc": 375, "opis": null, "odsun": 0}, {"od": [446.25, 15.0], "do": [446.25, 260.5], "dlugosc": 246, "opis": null, "odsun": 0}], "_poly": [[240.0, 0.0], [645.0, 0.0], [645.0, 268.0], [240.0, 268.0]], "_centroid": [442.5, 134.0], "_bbox": [240.0, 0.0, 645.0, 268.0], "_pole_osiowe": 10.85, "_pole": 9.21, "_wymiary": [375, 246], "_prostokat": true}}};
        
        const canvas = document.getElementById('planCanvas');
        const ctx = canvas.getContext('2d');
        
        let scale = 0.5; // Początkowe oddalenie
        let offsetX = window.innerWidth / 2;
        let offsetY = window.innerHeight / 2;

        // --- SEMANTYCZNE UMIESZCZANIE MEBLI (lokalny układ współrzędnych pomieszczenia) ---
        // Konwencja przesunięcia (zgodna z otworami w rooms.yaml):
        //   ściany polnoc/poludnie -> przesuniecie liczone od zachodniej (lewej) krawędzi, wzdłuż X
        //   ściany wschod/zachod   -> przesuniecie liczone od poludniowej (dolnej) krawędzi, wzdłuż Y
        function getDlugoscSciany(room, sciana) {
            return (sciana === 'polnoc' || sciana === 'poludnie') ? room.szerokosc : room.glebokosc;
        }

        function placeFurniture(room, mebel) {
            const sciana = mebel.przylega_do;
            const [dlugosc, glebMebla] = mebel.wymiary;
            const dlugoscSciany = getDlugoscSciany(room, sciana);
            let przesuniecie = mebel.przesuniecie;
            if (przesuniecie === undefined || przesuniecie === null) {
                przesuniecie = (dlugoscSciany - dlugosc) / 2; // domyślnie wyśrodkuj na ścianie
            }

            let lx, ly, w, h;
            switch (sciana) {
                case 'wschod':
                    ly = room.glebokosc - przesuniecie - dlugosc;
                    lx = room.szerokosc - glebMebla;
                    w = glebMebla; h = dlugosc;
                    break;
                case 'zachod':
                    ly = room.glebokosc - przesuniecie - dlugosc;
                    lx = 0;
                    w = glebMebla; h = dlugosc;
                    break;
                case 'polnoc':
                    lx = przesuniecie;
                    ly = 0;
                    w = dlugosc; h = glebMebla;
                    break;
                case 'poludnie':
                    lx = przesuniecie;
                    ly = room.glebokosc - glebMebla;
                    w = dlugosc; h = glebMebla;
                    break;
                default:
                    return null; // nieznana/brak ściany odniesienia - pomijamy
            }
            return { x: room.poczatek.x + lx, y: room.poczatek.y + ly, w, h };
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            draw();
        }
        window.addEventListener('resize', resize);

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Tło - siatka (grid)
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            ctx.lineWidth = 1;
            const gridSize = 100 * scale; // Siatka co 1 metr (100cm)
            const startX = offsetX % gridSize;
            const startY = offsetY % gridSize;
            for(let x = startX; x < canvas.width; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
            for(let y = startY; y < canvas.height; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }

            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale); // Używamy naturalnego układu Canvas: Y rośnie w dół, 0,0 w lewym górnym rogu

            // --- RYSOWANIE OBRYSU ZEWNĘTRZNEGO ---
            if (projectData.budynek && projectData.budynek.obrys_zewnetrzny) {
                const obrys = projectData.budynek.obrys_zewnetrzny;
                if(obrys.length > 0) {
                    ctx.beginPath();
                    ctx.moveTo(obrys[0][0], obrys[0][1]);
                    for(let i = 1; i < obrys.length; i++) {
                        ctx.lineTo(obrys[i][0], obrys[i][1]);
                    }
                    ctx.closePath();
                    
                    // Podłoga całego budynku
                    ctx.fillStyle = '#2d3436';
                    ctx.fill();
                    
                    // Ściany zewnętrzne (obrys)
                    ctx.lineWidth = projectData.budynek.grubosc_sciany_zewnetrznej || 30;
                    ctx.lineJoin = 'miter';
                    ctx.strokeStyle = '#5b6670';
                    ctx.stroke();

                    // --- WYMIAR OBRYSU PO LICU ZEWNĘTRZNYM (uwzględnia wypukłość rogów) ---
                    ctx.save();
                    const N = obrys.length;
                    let area2 = 0, cgx = 0, cgy = 0;
                    for(let i=0;i<N;i++){ const a=obrys[i], b=obrys[(i+1)%N]; area2 += a[0]*b[1]-b[0]*a[1]; cgx+=a[0]; cgy+=a[1]; }
                    cgx/=N; cgy/=N;
                    const wind = area2 > 0 ? 1 : -1;
                    const cvx = [];
                    for(let i=0;i<N;i++){
                        const p=obrys[(i-1+N)%N], c=obrys[i], q=obrys[(i+1)%N];
                        const cr=(c[0]-p[0])*(q[1]-c[1])-(c[1]-p[1])*(q[0]-c[0]);
                        cvx.push(cr*wind>0);
                    }
                    const halfZ = (projectData.budynek.grubosc_sciany_zewnetrznej || 30)/2;
                    ctx.fillStyle = '#fdcb6e';
                    ctx.font = 'bold 26px sans-serif';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    for(let i=0;i<N;i++){
                        const pt1=obrys[i], pt2=obrys[(i+1)%N];
                        const dist=Math.hypot(pt2[0]-pt1[0], pt2[1]-pt1[1]);
                        if(dist<=0.1) continue;
                        const zew = dist + (cvx[i]?halfZ:-halfZ) + (cvx[(i+1)%N]?halfZ:-halfZ);
                        const mx=(pt1[0]+pt2[0])/2, my=(pt1[1]+pt2[1])/2;
                        let ox=mx-cgx, oy=my-cgy; const ol=Math.hypot(ox,oy)||1;  // na zewnątrz od środka
                        ctx.fillText(Math.round(zew)+'', mx + ox/ol*90, my + oy/ol*90);
                    }
                    ctx.restore();
                }
            }

            // --- RYSOWANIE ŚCIAN WEWNĘTRZNYCH (nośne + działowe, z przerwami na otwory) ---
            function rysujSciany(lista, kolor, domyslnaGr) {
                if (!lista) return;
                ctx.save();
                ctx.lineCap = 'butt';
                lista.forEach(w => {
                    const ax = w.od[0], ay = w.od[1], bx = w.do[0], by = w.do[1];
                    const L2 = (bx-ax)*(bx-ax) + (by-ay)*(by-ay);
                    const pt = t => [ax + (bx-ax)*t, ay + (by-ay)*t];
                    // otwory jako przedziały [t1,t2] wzdłuż ściany
                    const ivs = (w.otwory || []).map(o => {
                        const t1 = ((o.od[0]-ax)*(bx-ax) + (o.od[1]-ay)*(by-ay)) / L2;
                        const t2 = ((o.do[0]-ax)*(bx-ax) + (o.do[1]-ay)*(by-ay)) / L2;
                        return [Math.min(t1,t2), Math.max(t1,t2)];
                    }).sort((a,b) => a[0]-b[0]);
                    ctx.lineWidth = w.grubosc || domyslnaGr;
                    ctx.strokeStyle = (w.typ === 'dzialowa') ? '#9aa7b4' : '#74808d';   // działowa jaśniej, nośna ciemniej
                    let cur = 0;
                    const seg = (t0, t1) => {
                        if (t1 <= t0) return;
                        const a = pt(t0), b = pt(t1);
                        ctx.beginPath(); ctx.moveTo(a[0], a[1]); ctx.lineTo(b[0], b[1]); ctx.stroke();
                    };
                    ivs.forEach(iv => { seg(cur, Math.max(cur, iv[0])); cur = Math.max(cur, iv[1]); });
                    seg(cur, 1);
                    // otwory: cienki znacznik progu (informacyjnie)
                    (w.otwory || []).forEach(o => {
                        const lw = ctx.lineWidth, ss = ctx.strokeStyle;
                        ctx.beginPath(); ctx.moveTo(o.od[0], o.od[1]); ctx.lineTo(o.do[0], o.do[1]);
                        ctx.lineWidth = 2/scale; ctx.strokeStyle = '#e74c3c'; ctx.stroke();
                        ctx.lineWidth = lw; ctx.strokeStyle = ss;
                    });
                });
                ctx.restore();
            }
            const _b = projectData.budynek || {};
            rysujSciany(_b.sciany, null, _b.grubosc_sciany_dzialowej || 15);
            // węzły wewnętrzne (wypełnienie rogów L/T) — kolorem wg grubości
            (_b._wezly || []).forEach(wz => {
                const h = wz.g / 2;
                ctx.fillStyle = (wz.g <= (_b.grubosc_sciany_dzialowej || 15) + 1) ? '#9aa7b4' : '#74808d';
                ctx.fillRect(wz.p[0]-h, wz.p[1]-h, wz.g, wz.g);
            });

            // --- OSIE (główne + wewnętrzne) z etykietami na obrzeżu bryły ---
            (function() {
                const ob = _b.obrys_zewnetrzny || [];
                if (!ob.length || !_b._osie) return;
                let x0=1e9,x1=-1e9,y0=1e9,y1=-1e9;
                ob.forEach(p => { x0=Math.min(x0,p[0]); x1=Math.max(x1,p[0]); y0=Math.min(y0,p[1]); y1=Math.max(y1,p[1]); });
                const m = 90;   // margines na etykiety
                function rysujOs(val, pion, glowna) {
                    ctx.save();
                    ctx.strokeStyle = glowna ? 'rgba(0,206,201,0.45)' : 'rgba(255,159,67,0.5)';
                    ctx.lineWidth = 2; ctx.setLineDash([24, 12, 6, 12]);
                    ctx.beginPath();
                    if (pion) { ctx.moveTo(val, y0-m); ctx.lineTo(val, y1+m); }
                    else      { ctx.moveTo(x0-m, val); ctx.lineTo(x1+m, val); }
                    ctx.stroke();
                    ctx.restore();
                }
                function etykieta(txt, x, y, glowna) {
                    ctx.fillStyle = glowna ? '#00cec9' : '#ff9f43';
                    ctx.font = (glowna ? 'bold ' : '') + '26px sans-serif';
                    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                    ctx.fillText(txt, x, y);
                }
                const O = _b._osie;
                for (const [id, v] of Object.entries(O.xg || {})) { rysujOs(v, true, true);  etykieta(id, v, y0-m+20, true); etykieta(id, v, y1+m-20, true); }
                for (const [id, v] of Object.entries(O.yg || {})) { rysujOs(v, false, true); etykieta(id, x0-m+20, v, true); etykieta(id, x1+m-20, v, true); }
                for (const [id, v] of Object.entries(O.xw || {})) { rysujOs(v, true, false);  etykieta(id, v, y0-m+52, false); }
                for (const [id, v] of Object.entries(O.yw || {})) { rysujOs(v, false, false); etykieta(id, x0-m+52, v, false); }
            })();

            // --- PUNKTY (wszystkie nazwane: zewn + wewn) ---
            if (_b._punkty) {
                ctx.save();
                ctx.textAlign = 'left'; ctx.textBaseline = 'bottom';
                for (const [nazwa, p] of Object.entries(_b._punkty)) {
                    ctx.beginPath(); ctx.arc(p[0], p[1], 6, 0, 2*Math.PI);
                    ctx.fillStyle = '#ff7675'; ctx.fill();
                    ctx.fillStyle = '#ffc9c7'; ctx.font = '20px monospace';
                    ctx.fillText(nazwa, p[0] + 9, p[1] - 7);
                }
                ctx.restore();
            }

            // --- RYSOWANIE POMIESZCZEŃ ---
            if (projectData.pomieszczenia) {
                const rooms = Object.values(projectData.pomieszczenia);
                const colors = ['#e17055', '#0984e3', '#00cec9', '#6c5ce7', '#fdcb6e', '#a29bfe', '#55efc4', '#ffeaa7'];
                
                rooms.forEach((room, index) => {
                    if (room._poly) {
                        // Pomieszczenie-wielokąt — etykiety (fonty w jednostkach świata: skalują się z zoomem;
                        // wiersze układane dynamicznie i centrowane, niezależnie ile ich jest).
                        const cx = room._centroid[0], cy = room._centroid[1];
                        const lines = [{ t: room.nazwa || '', f: 'bold 40px sans-serif', c: '#ffffff' }];
                        if (room._wymiary && room._prostokat)
                            lines.push({ t: room._wymiary[0] + ' × ' + room._wymiary[1] + ' cm', f: '28px sans-serif', c: '#dfe6e9' });
                        if (room._pole != null)
                            lines.push({ t: room._pole.toFixed(2) + ' m²', f: '28px sans-serif', c: '#b2bec3' });
                        ctx.save();
                        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                        const lh = 44;   // wysokość wiersza (świat)
                        let ly = cy - (lines.length - 1) * lh / 2;
                        lines.forEach(L => { ctx.font = L.f; ctx.fillStyle = L.c; ctx.fillText(L.t, cx, ly); ly += lh; });
                        ctx.restore();
                        rysujWymiary(room.wymiary);
                        return;
                    }
                    if(room.poczatek && room.szerokosc && room.glebokosc) {
                        // Wypełnienie pokoju
                        ctx.fillStyle = colors[index % colors.length] + '80'; // 50% opacity
                        ctx.fillRect(room.poczatek.x, room.poczatek.y, room.szerokosc, room.glebokosc);
                        
                        // Obrys cienkiej ściany (dla wizualizacji)
                        ctx.lineWidth = projectData.budynek.grubosc_sciany_dzialowej || 15;
                        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
                        ctx.strokeRect(room.poczatek.x, room.poczatek.y, room.szerokosc, room.glebokosc);

                        // Etykieta (tekst)
                        ctx.save();
                        ctx.fillStyle = 'white';
                        ctx.font = 'bold ' + (24/scale) + 'px sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        
                        const centerX = room.poczatek.x + room.szerokosc/2;
                        const centerY = room.poczatek.y + room.glebokosc/2;
                        
                        ctx.fillText(room.nazwa, centerX, centerY);
                        
                        // Metraż
                        ctx.font = (16/scale) + 'px sans-serif';
                        ctx.fillStyle = '#b2bec3';
                        const area = ((room.szerokosc * room.glebokosc) / 10000).toFixed(1);
                        ctx.fillText(area + ' m²', centerX, centerY + (30/scale));

                        ctx.restore();

                        // --- MEBLE (umieszczane semantycznie wg przylega_do) ---
                        if (Array.isArray(room.meble)) {
                            room.meble.forEach(mebel => {
                                if (!mebel.przylega_do || !Array.isArray(mebel.wymiary)) return;
                                const pos = placeFurniture(room, mebel);
                                if (!pos) return;

                                ctx.fillStyle = 'rgba(45, 52, 54, 0.85)';
                                ctx.fillRect(pos.x, pos.y, pos.w, pos.h);
                                ctx.lineWidth = 2 / scale;
                                ctx.strokeStyle = '#dfe6e9';
                                ctx.strokeRect(pos.x, pos.y, pos.w, pos.h);

                                ctx.save();
                                ctx.fillStyle = '#dfe6e9';
                                ctx.font = (11/scale) + 'px sans-serif';
                                ctx.textAlign = 'center';
                                ctx.textBaseline = 'middle';
                                ctx.fillText(mebel.nazwa || '', pos.x + pos.w/2, pos.y + pos.h/2);
                                ctx.restore();
                            });
                        }
                    }
                });
            }

            // --- LINIE WYMIAROWE (odległości między ścianami; budynek + każdy pokój) ---
            rysujWymiary(projectData.budynek && projectData.budynek.wymiary);

            ctx.restore();
        }

        function rysujWymiary(lista) {
            if (!lista) return;
            ctx.save();
            lista.forEach(wy => {
                let ax = wy.od[0], ay = wy.od[1], bx = wy.do[0], by = wy.do[1];
                const dx = bx-ax, dy = by-ay, L = Math.hypot(dx, dy) || 1;
                const nx = -dy/L, ny = dx/L;          // kierunek prostopadły
                const o = wy.odsun || 0;              // odsunięcie linii w bok
                ax += nx*o; ay += ny*o; bx += nx*o; by += ny*o;
                ctx.strokeStyle = '#ff7675'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.stroke();
                const t = 18;                          // ticki na końcach (świat)
                [[ax,ay],[bx,by]].forEach(p => {
                    ctx.beginPath(); ctx.moveTo(p[0]-nx*t, p[1]-ny*t); ctx.lineTo(p[0]+nx*t, p[1]+ny*t); ctx.stroke();
                });
                ctx.fillStyle = '#ff7675'; ctx.font = 'bold 28px sans-serif';
                ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
                const mx = (ax+bx)/2 + nx*26, my = (ay+by)/2 + ny*26;
                ctx.fillText((wy.opis ? wy.opis + ': ' : '') + wy.dlugosc + ' cm', mx, my);
            });
            ctx.restore();
        }

        // --- OBSŁUGA MYSZKI (Pan & Zoom) ---
        let isDragging = false;
        let lastX = 0, lastY = 0;
        
        canvas.addEventListener('mousedown', e => {
            if (e.button === 2 || e.button === 0) {
                isDragging = true;
                lastX = e.clientX;
                lastY = e.clientY;
            }
        });
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', e => {
            if (isDragging) {
                offsetX += e.clientX - lastX;
                offsetY += e.clientY - lastY;
                lastX = e.clientX;
                lastY = e.clientY;
                draw();
            }
        });
        canvas.addEventListener('wheel', e => {
            e.preventDefault();
            const zoomSensitivity = 0.001;
            const delta = -e.deltaY * zoomSensitivity;
            const newScale = Math.max(0.05, Math.min(10, scale * Math.exp(delta))); // Limit zoom
            
            // Zoom towards cursor
            const mouseX = e.clientX - offsetX;
            const mouseY = e.clientY - offsetY;
            offsetX -= mouseX * (newScale / scale - 1);
            offsetY -= mouseY * (newScale / scale - 1);
            
            scale = newScale;
            draw();
        }, {passive: false});
        canvas.oncontextmenu = () => false;

        // Legenda warstw (liczniki)
        (function() {
            const b = projectData.budynek || {};
            const sc = b.sciany || [];
            const nn = sc.filter(w => w.typ !== 'dzialowa').length;
            const nd = sc.filter(w => w.typ === 'dzialowa').length;
            const sw = (c) => '<span style="display:inline-block;width:12px;height:12px;background:'+c+';margin-right:6px;border:1px solid #555;vertical-align:middle;"></span>';
            document.getElementById('legenda').innerHTML =
                sw('#636e72') + 'Obrys zewnętrzny<br>' +
                sw('#636e72') + 'Ściany nośne (30): ' + nn + '<br>' +
                sw('#636e72') + 'Ściany działowe (15): ' + nd;
        })();

        resize();

        // Centrowanie na środku budynku na start
        if(projectData.budynek && projectData.budynek.obrys_zewnetrzny) {
            let minX=Infinity, maxX=-Infinity, minY=Infinity, maxY=-Infinity;
            projectData.budynek.obrys_zewnetrzny.forEach(pt => {
                if(pt[0] < minX) minX = pt[0];
                if(pt[0] > maxX) maxX = pt[0];
                if(pt[1] < minY) minY = pt[1];
                if(pt[1] > maxY) maxY = pt[1];
            });
            const centerX = minX + (maxX-minX)/2;
            const centerY = minY + (maxY-minY)/2;
            offsetX = window.innerWidth/2 - centerX * scale;
            offsetY = window.innerHeight/2 - centerY * scale; 
            draw();
        }
    </script>
</body>
